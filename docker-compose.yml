version: "3.9"
services:
  db:
    build: ./db
    container_name: phone-shop-db
    ports:
      - "27017:27017"
  backend:
    build: ./backend
    container_name: phone-shop-backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URL=mongodb://phone-shop-db:27017/phone_shop
      - SESSION_SECRET=dev_secret
      - CORS_ORIGIN=http://localhost:5173
      - SEED_DEMO=true
    depends_on:
      - db
  frontend:
    build: ./frontend
    container_name: phone-shop-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:4000/api
    depends_on:
      - backend
